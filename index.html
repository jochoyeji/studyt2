<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성취도 기반 자기주도학습 플래너</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <main id="screen-main" class="screen active">
            <header class="header">
                <h1 id="current-month-year">--년 --월</h1>
                <button id="btn-menu" class="icon-btn" aria-label="메뉴 열기">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
            </header>

            <section class="stats-container">
                <div class="stat-box">
                    <span class="stat-label">평균 달성률</span>
                    <span id="stat-avg" class="stat-value">-</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">어제 달성률</span>
                    <span id="stat-yesterday" class="stat-value">-</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">연속 성취도</span>
                    <span id="stat-streak" class="stat-value">-일</span>
                </div>
            </section>

            <section id="calendar-container" class="calendar-grid">
                </section>
        </main>

    <div id="screen-timetable" class="screen content-padding">
        <header class="header" style="border-bottom:none; padding:15px 0;">
            <button class="btn-back btn-text">⬅ 뒤로가기</button>
            <h2>요일별 시간표 설정</h2>
        <div class="header-placeholder"></div>
        </header>

    <div class="day-tabs">
        <button class="tab-btn active" data-day="1">월</button>
        <button class="tab-btn" data-day="2">화</button>
        <button class="tab-btn" data-day="3">수</button>
        <button class="tab-btn" data-day="4">목</button>
        <button class="tab-btn" data-day="5">금</button>
        <button class="tab-btn" data-day="6">토</button>
        <button class="tab-btn" data-day="0">일</button>
    </div>

    <div class="timetable-box">
        <div class="timetable-header">
            <span id="selected-day-title">월요일 목표 시간표</span>
            <button id="btn-add-slot" class="btn-text" style="padding:3px 8px; font-size:0.85rem;">+ 추가</button>
        </div>
        
        <div id="timetable-slots-container"></div>

        <div class="timetable-footer">
            <span>하루 총 목표 시간: <strong id="total-target-text">0시간 0분</strong></span>
            <button id="btn-save-timetable" class="btn-text">시간표 저장</button>
        </div>
    </div>
</div>
        <div id="screen-rewards" class="screen content-padding">
            <button class="btn-back btn-text">⬅ 뒤로가기</button>
            <h2 style="margin-top:20px;">성취도 보상 목록 화면</h2>
        </div>
        <div id="screen-settings" class="screen content-padding">
            <button class="btn-back btn-text">⬅ 뒤로가기</button>
            <h2 style="margin-top:20px;">설정 화면</h2>
        </div>

        <div id="menu-modal" class="modal-overlay hidden">
            <div class="modal-content square-modal">
                <button id="btn-close-menu" class="btn-close-box">X</button>
                <div class="menu-button-group">
                    <button class="menu-btn box-button" data-target="screen-timetable">요일별 시간표 설정</button>
                    <button class="menu-btn box-button" data-target="screen-rewards">성취도 보상 목록</button>
                    <button class="menu-btn box-button" data-target="screen-settings">설정</button>
                </div>
            </div>
        </div>

        <div id="study-time-modal" class="modal-overlay hidden">
            <div class="study-modal-box">
                <h3>실제 공부 시간 입력</h3>
                <div class="time-input-group">
                    <input type="number" id="input-hours" min="0" placeholder="0"> 시간
                    <input type="number" id="input-minutes" min="0" max="59" placeholder="00"> 분
                </div>
                <p id="study-time-error" class="error-text hidden">올바른 시간을 입력하세요.</p>
                <button id="btn-save-time" class="btn-text">완료</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/records.js"></script>
    <script src="js/calendar.js"></script>
</body>
</html>
