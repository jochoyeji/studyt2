<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성취도 기반 자기주도학습 플래너</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <main id="screen-main" class="screen active">
            <header class="header">
                <h1 id="current-month-year">--년 --월</h1>
                <button id="btn-menu" class="icon-btn" aria-label="메뉴 열기">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
            </header>

            <section class="stats-container">
                <div class="stat-box">
                    <span class="stat-label">평균 달성률</span>
                    <span id="stat-avg" class="stat-value">-</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">어제 달성률</span>
                    <span id="stat-yesterday" class="stat-value">-</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">연속 성취도</span>
                    <span id="stat-streak" class="stat-value">-일</span>
                </div>
            </section>

            <section id="calendar-container" class="calendar-grid">
                </section>
        </main>

    <div id="screen-timetable" class="screen content-padding">
        <header class="header" style="border-bottom:none; padding:15px 0;">
            <button class="btn-back btn-text">⬅ 뒤로가기</button>
            <h2>요일별 시간표 설정</h2>
        <div class="header-placeholder"></div>
        </header>

    <div class="day-tabs">
        <button class="tab-btn active" data-day="1">월</button>
        <button class="tab-btn" data-day="2">화</button>
        <button class="tab-btn" data-day="3">수</button>
        <button class="tab-btn" data-day="4">목</button>
        <button class="tab-btn" data-day="5">금</button>
        <button class="tab-btn" data-day="6">토</button>
        <button class="tab-btn" data-day="0">일</button>
    </div>

    <div class="timetable-box">
        <div class="timetable-header">
            <span id="selected-day-title">월요일 목표 시간표</span>
            <button id="btn-add-slot" class="btn-text" style="padding:3px 8px; font-size:0.85rem;">+ 추가</button>
        </div>
        
        <div id="timetable-slots-container"></div>

        <div class="timetable-footer">
            <span>하루 총 목표 시간: <strong id="total-target-text">0시간 0분</strong></span>
            <button id="btn-save-timetable" class="btn-text">시간표 저장</button>
        </div>
    </div>
</div>
        <div id="screen-rewards" class="screen content-padding">
    <header class="header" style="border-bottom:none; padding:15px 0;">
        <button class="btn-back btn-text">⬅ 뒤로가기</button>
        <h2>성취도 보상 목록</h2>
        <div class="header-placeholder"></div>
    </header>

    <div class="reward-input-box">
        <input type="text" id="input-reward-text" placeholder="나에게 줄 보상을 입력하세요 (예: 치킨 먹기)">
        <button id="btn-add-reward" class="btn-text">추가</button>
    </div>

    <div id="reward-list-container">
        </div>
    </div>
        <div id="screen-settings" class="screen content-padding">
            <button class="btn-back btn-text">⬅ 뒤로가기</button>
            <h2 style="margin-top:20px;">설정 화면</h2>
        </div>

        <div id="menu-modal" class="modal-overlay hidden">
            <div class="modal-content square-modal">
                <button id="btn-close-menu" class="btn-close-box">X</button>
                <div class="menu-button-group">
                    <button class="menu-btn box-button" data-target="screen-timetable">요일별 시간표 설정</button>
                    <button class="menu-btn box-button" data-target="screen-rewards">성취도 보상 목록</button>
                    <button class="menu-btn box-button" data-target="screen-settings">설정</button>
                </div>
            </div>
        </div>

        <div id="study-time-modal" class="modal-overlay hidden">
            <div class="study-modal-box">
                <h3>실제 공부 시간 입력</h3>
                <div class="time-input-group">
                    <input type="number" id="input-hours" min="0" placeholder="0"> 시간
                    <input type="number" id="input-minutes" min="0" max="59" placeholder="00"> 분
                </div>
                <p id="study-time-error" class="error-text hidden">올바른 시간을 입력하세요.</p>
                <button id="btn-save-time" class="btn-text">완료</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/records.js"></script>
    <script>
    (function() {
        // --- [기존 캘린더 변수 및 함수] ---
        const calendarContainer = document.getElementById('calendar-container');
        const monthYearDisplay = document.getElementById('current-month-year');
        const studyModal = document.getElementById('study-time-modal');
        const inputHours = document.getElementById('input-hours');
        const inputMinutes = document.getElementById('input-minutes');
        const errorText = document.getElementById('study-time-error');
        const btnSaveTime = document.getElementById('btn-save-time');
        let selectedDateStr = null;

        // --- [4단계 추가: 시간표 변수] ---
        const TIMETABLE_KEY = 'timetable';
        let currentSelectedDay = 1; // 기본값: 월요일(1)
        const dayNames = { 1: '월요일', 2: '화요일', 3: '수요일', 4: '목요일', 5: '금요일', 6: '토요일', 0: '일요일' };
        
        const tabButtons = document.querySelectorAll('.tab-btn');
        const selectedDayTitle = document.getElementById('selected-day-title');
        const slotsContainer = document.getElementById('timetable-slots-container');
        const btnAddSlot = document.getElementById('btn-add-slot');
        const btnSaveTimetable = document.getElementById('btn-save-timetable');
        const totalTargetText = document.getElementById('total-target-text');

    function renderCalendar() {
        if (!calendarContainer || !monthYearDisplay) return;
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth(); 
        const todayDate = now.getDate();
        monthYearDisplay.textContent = `${year}년 ${month + 1}월`;
        calendarContainer.innerHTML = '';
        const daysOfWeek = ['일', '월', '화', '수', '목', '금', '토'];
        daysOfWeek.forEach(day => {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'cal-header-day';
            dayDiv.textContent = day;
            calendarContainer.appendChild(dayDiv);
        });
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        for (let i = 0; i < firstDay; i++) {
            const emptyDiv = document.createElement('div');
            calendarContainer.appendChild(emptyDiv);
        }
        let records = {};
        if (window.StudyRecords && typeof window.StudyRecords.getAllRecords === 'function') {
            records = window.StudyRecords.getAllRecords();
        }
        for (let i = 1; i <= daysInMonth; i++) {
            const dateDiv = document.createElement('div');
            dateDiv.className = 'cal-day';
            if (i === todayDate) dateDiv.classList.add('today');
            const dateSpan = document.createElement('span');
            dateSpan.textContent = i;
            const gradeSpan = document.createElement('span');
            gradeSpan.className = 'grade-display';
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            if (records[dateStr] && records[dateStr].grade) {
                gradeSpan.textContent = records[dateStr].grade;
            }
            dateDiv.appendChild(dateSpan);
            dateDiv.appendChild(gradeSpan);
            dateDiv.addEventListener('click', () => {
                selectedDateStr = dateStr;
                openStudyModal();
            });
            calendarContainer.appendChild(dateDiv);
        }
        updateTopStats(year, month, records);
    }

    function updateTopStats(year, month, records) {
        const statAvg = document.getElementById('stat-avg');
        const statYesterday = document.getElementById('stat-yesterday');
        const statStreak = document.getElementById('stat-streak');
        if (!statAvg || !statYesterday || !statStreak) return;

        let totalPercent = 0;
        let count = 0;
        const prefix = `${year}-${String(month + 1).padStart(2, '0')}`;
        Object.keys(records).forEach(dateKey => {
            if (dateKey.startsWith(prefix)) {
                totalPercent += records[dateKey].percent;
                count++;
            }
        });
        statAvg.textContent = count > 0 ? `${Math.round(totalPercent / count)}%` : '-';

        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yKey = `${yesterday.getFullYear()}-${String(yesterday.getMonth() + 1).padStart(2, '0')}-${String(yesterday.getDate()).padStart(2, '0')}`;
        if (records[yKey]) {
            statYesterday.textContent = `${records[yKey].grade}(${records[yKey].percent}%)`;
        } else {
            statYesterday.textContent = '-';
        }

        let streak = 0;
        let checkDate = new Date();
        let safetyCounter = 0;
        while (safetyCounter < 100) {
            safetyCounter++;
            const cKey = `${checkDate.getFullYear()}-${String(checkDate.getMonth() + 1).padStart(2, '0')}-${String(checkDate.getDate()).padStart(2, '0')}`;
            const record = records[cKey];
            if (record && ['SS', 'S', 'A'].includes(record.grade)) {
                streak++;
                checkDate.setDate(checkDate.getDate() - 1);
            } else {
                if (streak === 0 && cKey === `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}-${String(new Date().getDate()).padStart(2, '0')}`) {
                    checkDate.setDate(checkDate.getDate() - 1);
                    continue;
                }
                break;
            }
        }
        statStreak.textContent = streak >= 2 ? `${streak}일` : '-일';
    }

    function openStudyModal() {
        if (!studyModal) return;
        inputHours.value = '';
        inputMinutes.value = '';
        errorText.classList.add('hidden');
        studyModal.classList.remove('hidden');
    }

    function closeStudyModal() {
        if (studyModal) studyModal.classList.add('hidden');
    }

    // --- [4단계 추가: 시간표 핵심 로직 함수] ---
    function initTimetable() {
        tabButtons.forEach(button => {
            button.addEventListener('click', (e) => {
                tabButtons.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentSelectedDay = Number(e.target.getAttribute('data-day'));
                loadTimetableForDay(currentSelectedDay);
            });
        });

        btnAddSlot.addEventListener('click', () => {
            createSlotRow('', '');
            calculateTotalTargetTime();
        });

        btnSaveTimetable.addEventListener('click', () => {
            saveTimetableForDay();
        });

        // 초기 실행 시 월요일 데이터 로드
        loadTimetableForDay(currentSelectedDay);
    }

    function loadTimetableForDay(day) {
        selectedDayTitle.textContent = `${dayNames[day]} 목표 시간표`;
        slotsContainer.innerHTML = '';

        if (!window.AppStorage) return;
        const timetable = window.AppStorage.get(TIMETABLE_KEY) || {};
        const daySlots = timetable[day] || [];

        if (daySlots.length === 0) {
            // 데이터가 없으면 기본 빈 슬롯 하나 생성
            createSlotRow('09:00', '12:00');
        } else {
            daySlots.forEach(slot => {
                createSlotRow(slot.start, slot.end);
            });
        }
        calculateTotalTargetTime();
    }

    function createSlotRow(startTime = '', endTime = '') {
        const row = document.createElement('div');
        row.className = 'slot-row';

        row.innerHTML = `
            <div class="slot-inputs">
                <input type="time" class="input-start" value="${startTime}">
                <span>~</span>
                <input type="time" class="input-end" value="${endTime}">
            </div>
            <button class="btn-delete-slot">삭제</button>
        `;

        // 삭제 버튼 이벤트 바인딩
        row.querySelector('.btn-delete-slot').addEventListener('click', () => {
            row.remove();
            calculateTotalTargetTime();
        });

        // 시간 변경시 실시간 계산 바인딩
        row.querySelector('.input-start').addEventListener('change', calculateTotalTargetTime);
        row.querySelector('.input-end').addEventListener('change', calculateTotalTargetTime);

        slotsContainer.appendChild(row);
    }

    function calculateTotalTargetTime() {
        const rows = slotsContainer.querySelectorAll('.slot-row');
        let totalMinutes = 0;

        rows.forEach(row => {
            const startVal = row.querySelector('.input-start').value;
            const endVal = row.querySelector('.input-end').value;

            if (startVal && endVal) {
                const [sH, sM] = startVal.split(':').map(Number);
                const [eH, eM] = endVal.split(':').map(Number);
                const diff = (eH * 60 + eM) - (sH * 60 + sM);
                if (diff > 0) totalMinutes += diff;
            }
        });

        const hours = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;
        totalTargetText.textContent = `${hours}시간 ${minutes}분`;
    }

    function saveTimetableForDay() {
        if (!window.AppStorage) return;
        const rows = slotsContainer.querySelectorAll('.slot-row');
        const daySlots = [];
        let isValid = true;

        rows.forEach(row => {
            const start = row.querySelector('.input-start').value;
            const end = row.querySelector('.input-end').value;

            if (!start || !end) {
                isValid = false;
                return;
            }

            const [sH, sM] = start.split(':').map(Number);
            const [eH, eM] = end.split(':').map(Number);
            if ((eH * 60 + eM) <= (sH * 60 + sM)) {
                isValid = false;
            }

            daySlots.push({ start, end });
        });

        if (!isValid) {
            if (window.showToast) window.showToast('올바른 시작/종료 시간을 입력해 주세요.', true);
            return;
        }

        const timetable = window.AppStorage.get(TIMETABLE_KEY) || {};
        timetable[currentSelectedDay] = daySlots;

        const success = window.AppStorage.save(TIMETABLE_KEY, timetable);
        if (success) {
            if (window.showToast) window.showToast(`${dayNames[currentSelectedDay]} 시간표가 저장되었습니다!`);
            renderCalendar(); // 달력 성취도 기준 실시간 동기화 갱신
        }
    }

    // 초기 로드 시점 일괄 실행 실행 제어부
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
            renderCalendar();
            initTimetable();
        });
    } else {
        renderCalendar();
        initTimetable();
    }

    // 모달 이벤트 바인딩
    if (studyModal) {
        studyModal.addEventListener('click', (e) => {
            if (e.target === studyModal) closeStudyModal();
        });
    }

    if (btnSaveTime) {
        btnSaveTime.addEventListener('click', () => {
            const hStr = inputHours.value.trim();
            const mStr = inputMinutes.value.trim();
            if (hStr === '' && mStr === '') { errorText.classList.remove('hidden'); return; }
            const hours = hStr === '' ? 0 : Number(hStr);
            const minutes = mStr === '' ? 0 : Number(mStr);
            if (isNaN(hours) || isNaN(minutes) || hours < 0 || minutes < 0) { errorText.classList.remove('hidden'); return; }
            errorText.classList.add('hidden');

            if (window.StudyRecords && typeof window.StudyRecords.saveRecord === 'function') {
                const result = window.StudyRecords.saveRecord(selectedDateStr, hours, minutes);
                if (result.success) {
                    closeStudyModal();
                    renderCalendar();
                    if (result.isOver) {
                        if (window.showToast) window.showToast('목표 시간을 초과하여 100%로 기록되었습니다!');
                    } else {
                        if (window.showToast) window.showToast(result.message);
                    }
                } else {
                    if (window.showToast) window.showToast(result.message, true);
                }
            }
        });
    }
})();
</script>
    
</body>
</html>
